        <ul class="reach-list" id="wk-list"></ul>
      </div>
      <div class="sp-callout">
        <h3 id="sc-title"></h3>
        <p id="sc-body"></p>
        <a href="../pages/contact.html" class="btn-primary" id="sc-btn"></a>
      </div>
    </div>
  </div>
</section>

<!-- ROSTER -->

    </div>

</section>

    <div style="margin-top:2rem;display:flex;gap:1rem;flex-wrap:wrap">

<!-- MODAL -->
<div id="player-modal">
  <div class="modal-box">
    <div class="modal-bar"><button id="modal-close">✕</button></div>

  </div>
</div>

<footer id="main-footer"></footer>
<script src="../js/data.js"></script>
<script src="../js/main.js"></script>
<script>
Aurum.init('sponsors');
function render(){
  const l = Aurum.getLang();
  document.getElementById('bc').textContent      = l==='en'?'For Sponsors':'스폰서';
  document.getElementById('ph1').innerHTML       = l==='en'?'Partner with <em>Aurum</em>':'<em>Aurum</em>과 파트너가 되세요';
  document.getElementById('ph-sub').textContent  = l==='en'?'Reach the most passionate golf market in the world — Korean and Korean-American fans.':'세계에서 가장 열정적인 골프 시장 — 한국 및 재미교포 팬에게 도달하세요.';

  document.getElementById('wk-lbl').textContent   = l==='en'?'Why Korean Golf?':'왜 한국 골프인가?';
  document.getElementById('wk-title').textContent  = l==='en'?'The Most Dominant Force in Women\'s Golf':'여자 골프에서 가장 강력한 힘';
  document.getElementById('wk-body').textContent   = l==='en'
    ? 'Korean women have won more than 40% of LPGA events over the last decade, dominating world rankings and commanding passionate, brand-loyal fan bases across South Korea, Japan, and the Korean-American diaspora.'
    : '지난 10년간 LPGA 대회의 40% 이상을 한국 선수가 우승했습니다. 세계 랭킹을 석권하며 한국, 일본, 재미교포에 걸쳐 브랜드 충성도가 높은 팬층을 보유합니다.';

  const listItems = l==='en'
    ? ['LPGA Tour broadcasts reach millions in South Korea, Japan & the US','Korean fans have some of the highest brand-recall rates in sports','Aurum athletes bridge US and Asian markets simultaneously','Bilingual athletes create authentic content for both audiences','Sponsoring an Aurum athlete = entering the Korean consumer economy']
    : ['LPGA 투어 방송은 한국, 일본, 미국에서 수백만 명에게 도달','한국 팬은 스포츠 중 브랜드 회상률이 가장 높은 편','Aurum 선수들은 미국과 아시아 시장을 동시에 연결','이중언어 선수들이 양 시장에 진정성 있는 콘텐츠 제공','Aurum 선수 스폰서 = 한국 소비자 경제 진입'];
  document.getElementById('wk-list').innerHTML = listItems.map(i=>`<li>${i}</li>`).join('');

  document.getElementById('sc-title').textContent = l==='en'?'Start a Conversation':'대화를 시작하세요';
  document.getElementById('sc-body').textContent  = l==='en'
    ? 'Sophia works directly with brand managers and marketing teams to build sponsorship packages that fit your goals — from full title sponsorship to targeted digital placements.'
    : '소피아는 브랜드 매니저 및 마케팅 팀과 직접 협력하여 목표에 맞는 스폰서십 패키지를 구성합니다. 전체 타이틀 스폰서십부터 타겟 디지털 배치까지.';
  document.getElementById('sc-btn').textContent   = l==='en'?'Schedule a Call':'미팅 예약';

  // document.getElementById('ro-lbl').textContent   = l==='en'?'Our Athletes':'소속 선수단';
  // document.getElementById('ro-title').textContent  = l==='en'?'Current Roster':'현재 선수단';
  // document.getElementById('ro-sub').textContent    = l==='en'?'Click any player to explore their profile and sponsorship availability.':'선수를 클릭하여 프로필과 스폰서십 가능 여부를 확인하세요.';
  // document.getElementById('roster-grid').innerHTML = PLAYERS.map(p=>Aurum.playerCard(p,false)).join('');

  const sponsorLogos = [
    { name: 'Mizuno', file: 'mizuno.png' },
    { name: 'Volvik', file: 'volvik.png' },
    { name: 'Callaway', file: 'callaway.png' },
    { name: 'PING', file: 'ping.png' },
    { name: 'LaoLao Bay Golf & Resort', file: 'laolao-bay-golf-and-resort.png' },
    { name: 'Macaw Golf Wear', file: 'macaw-golf-wear.png' },
    { name: 'Madcattos Golf Wear', file: 'madcattos-golf-wear.png' },
    { name: 'Conrad Seoul', file: 'conrad-seoul.png' },
    { name: 'Haroutine US', file: 'haroutine-us.png' },
    { name: 'Previnex', file: 'previnex.png' },
    { name: 'Lexfeel', file: 'lexfeel.png' },
    { name: 'Spar', file: 'spar.png' },
  ];
  document.getElementById('sl-lbl').textContent    = l==='en'?'Current Partners':'현재 파트너';
  document.getElementById('sl-title').textContent  = l==='en'?'Trusted Sponsor Lineup':'스폰서 라인업';
  document.getElementById('sl-sub').textContent    = l==='en'?'Brands currently partnered with Aurum athletes across golf equipment, apparel, hospitality, wellness, and lifestyle.':'골프 장비, 의류, 리조트, 웰니스, 라이프스타일 분야에서 Aurum 선수들과 함께하는 파트너 브랜드입니다.';
  document.getElementById('sponsor-logo-grid').innerHTML = sponsorLogos.map(s=>`
    <div class="sponsor-logo-card" aria-label="${s.name}">
      <img src="../images/logos/${s.file}" alt="${s.name} logo" loading="lazy" onerror="this.style.display='none'"/>
      <span class="sponsor-logo-name">${s.name}</span>
    </div>`).join('');

  document.getElementById('st-lbl').textContent   = l==='en'?'Sponsorship Levels':'스폰서십 레벨';
  document.getElementById('st-title').textContent  = l==='en'?'Partnership Tiers':'파트너십 등급';
  document.getElementById('st-sub').textContent    = l==='en'?'Available for each athlete individually — mix and match across the roster.':'각 선수별로 개별 제공됩니다. 선수단 전체에서 선택 가능합니다.';
  document.getElementById('tiers').innerHTML       = Aurum.sponsorTiersHTML();
  document.getElementById('st-btn1').textContent   = l==='en'?'Request Sponsorship Deck':'스폰서십 자료 요청';
  document.getElementById('st-btn2').textContent   = l==='en'?'View Full Roster':'전체 선수단 보기';
}
render(); document.addEventListener('aurum:lang', render);
</script>
</body>
</html>
